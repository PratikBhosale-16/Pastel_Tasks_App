<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Pastel Tasks - Stay Focused</title>

                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",

                    spacing: {

                    fontFamily: {
                        "label-md": ["Plus Jakarta Sans"],

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        
        .task-enter {
            animation: slideUpFade 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        
        .task-enter:nth-child(1) { animation-delay: 0.1s; }
        .task-enter:nth-child(2) { animation-delay: 0.2s; }
        .task-enter:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .check-anim {
            animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.8s;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes scaleIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Placeholder (Hidden for onboarding) -->
<main class="flex-grow flex flex-col items-center justify-center px-container-padding py-xl max-w-[800px] mx-auto w-full">
<!-- Visual Section -->
<div class="flex-grow flex items-center justify-center w-full mb-xl">
<div class="relative w-full max-w-sm aspect-square">
<!-- Abstract decorative background elements -->
<div class="absolute inset-0 bg-primary-fixed rounded-full blur-[60px] opacity-40 animate-pulse"></div>
<div class="absolute inset-4 bg-surface-container-lowest rounded-[32px] shadow-[0_8px_32px_rgba(103,75,181,0.08)] overflow-hidden flex flex-col p-lg border border-surface-variant">
<div class="flex items-center justify-between mb-lg">
<div class="h-2 w-16 bg-surface-variant rounded-full"></div>
<div class="h-6 w-6 rounded-full bg-surface-variant"></div>
</div>
<div class="space-y-base flex-grow">
<!-- Task 1 -->
<div class="glass-card rounded-xl p-md flex items-center gap-md task-enter transition-transform duration-200 hover:scale-[0.98]">
<div class="w-5 h-5 rounded-[8px] border-2 border-outline-variant shrink-0"></div>
<div class="flex-col flex gap-xs w-full">
<div class="h-3 w-3/4 bg-on-surface-variant rounded-full opacity-20"></div>
<div class="h-2 w-1/2 bg-on-surface-variant rounded-full opacity-10"></div>
</div>
</div>
<!-- Task 2 (Completed) -->
<div class="glass-card rounded-xl p-md flex items-center gap-md task-enter bg-surface-container-low transition-transform duration-200 hover:scale-[0.98]">
<div class="w-5 h-5 rounded-[8px] bg-secondary flex items-center justify-center shrink-0 relative check-anim">
<span class="material-symbols-outlined text-[14px] text-on-secondary font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex-col flex gap-xs w-full opacity-50 relative">
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-on-surface-variant origin-left scale-x-0 transition-transform duration-500 delay-[1000ms] ease-out" id="strike"></div>
<div class="h-3 w-2/3 bg-on-surface-variant rounded-full opacity-20"></div>
<div class="h-2 w-1/3 bg-on-surface-variant rounded-full opacity-10"></div>
</div>
</div>
<!-- Task 3 -->
<div class="glass-card rounded-xl p-md flex items-center gap-md task-enter transition-transform duration-200 hover:scale-[0.98]">
<div class="w-5 h-5 rounded-[8px] border-2 border-outline-variant shrink-0"></div>
<div class="flex-col flex gap-xs w-full">
<div class="h-3 w-4/5 bg-on-surface-variant rounded-full opacity-20"></div>
<div class="h-2 w-2/5 bg-on-surface-variant rounded-full opacity-10"></div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="w-full text-center mb-xl space-y-md">
<h1 class="font-display-lg text-display-lg md:font-headline-lg md:text-headline-lg text-on-background">Stay Focused</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">A clean interface designed to help you accomplish more.</p>
</div>
<!-- Action & Progress -->
<div class="w-full max-w-sm flex flex-col items-center gap-xl pb-lg">
<!-- Progress Dots -->
<div class="flex gap-2 items-center justify-center">
<div class="w-2 h-2 rounded-full bg-surface-variant transition-colors"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant transition-colors"></div>
<div class="w-8 h-2 rounded-full bg-primary transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant transition-colors"></div>
</div>
<!-- Next Button -->
<button class="w-full py-md px-lg bg-primary-container text-on-primary-container font-title-md text-title-md rounded-full shadow-sm hover:opacity-90 active:scale-98 transition-all duration-200 flex items-center justify-center gap-2 group">
<span>Next</span>
<span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
<!-- Skip Link (Optional onboarding pattern) -->
<button class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors">Skip</button>
</div>
</main>
<script>
        // Simple script to trigger the strike-through animation after the check animation
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const strike = document.getElementById('strike');
                if(strike) {
                    strike.style.transform = 'scaleX(1)';
                }
            }, 1200); // Wait for check animation + a bit
        });
    </script>
</body></html>
