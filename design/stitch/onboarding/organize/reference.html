<div class="relative w-full h-full flex flex-col items-center justify-center gap-md">
<!-- Bento-style tag arrangement -->

<!-- Tag 1 -->
<div class="bg-secondary-container/20 text-secondary border border-secondary-container/50 px-4 py-2 rounded-full flex items-center gap-xs shadow-sm transform -rotate-2 hover:scale-105 transition-transform">

</div>
<!-- Tag 2 -->
<div class="bg-tertiary-container/20 text-tertiary border border-tertiary-container/50 px-4 py-2 rounded-full flex items-center gap-xs shadow-sm transform rotate-3 hover:scale-105 transition-transform">

<span class="font-label-md text-label-md">Work</span>
</div>
<!-- Tag 3 -->

</div>

<span class="font-label-md text-label-md">High Priority</span>
</div>
</div>
</div>
</div>
