<style>
        /* Custom animation for a calm, breathing loading effect */
        @keyframes breathe {
            0%, 100% { opacity: 0.4; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .animate-breathe {
            animation: breathe 3s ease-in-out infinite;
        }
        
        /* Level 1 Shadow from guidance */
        .shadow-level-1 {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        
        /* Subtle ambient glow behind center content */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--tw-colors-primary-fixed) 0%, transparent 70%);
            opacity: 0.5;
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-background min-h-screen w-full flex flex-col items-center justify-between overflow-hidden relative">
<!-- Ambient background glow for 'soft lighting' aesthetic -->
<div class="ambient-glow"></div>
<!-- Top Spacer to push content exactly to center visually -->
<div class="flex-1 w-full"></div>
<!-- Center Content: App Icon & Name -->
<main class="flex flex-col items-center justify-center z-10 px-container-padding">
<!-- App Icon Wrapper with Level 1 Shadow -->
<div class="bg-surface-container-lowest rounded-3xl p-1 shadow-level-1 mb-8 transform transition-transform duration-1000 ease-out translate-y-0 opacity-100" style="animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
<!-- Embedding exact placeholder provided by user. No data-alt needed for DATA:IMAGE placeholders. -->
<img class="w-32 h-32 md:w-40 md:h-40 rounded-[1.25rem] object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKBiOFfysHEQaPxvUIpxsXmTXBOFaO2PrG0DNGxsz6Vla5aGNRMHqUEGELTqDxrLojAGgy8pLSiTXneMaklFlkSxv9sv4knG5h08UwjQh12EXqwvOtU9HmR2Xq2EpbI2dFnPL416qWNB2OF6YVpKLUPPE8SPpB_6dLFu_u4oi8k-13BIbgf3WiCs631vdYZshvGm3zmiqd1kvy7TQ3rKvBKRz0SAZwCBeyFg2lSdk4uHpUMluOEnzWJR6o7ciSGe2YbXhVWlel8Ng"/>
</div>
<!-- App Name -->
<h1 class="font-display-lg text-display-lg text-primary text-center tracking-tight" style="animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px);">
            Pastel Tasks
        </h1>
<!-- Subtitle/Tagline for added premium feel -->
<p class="font-body-md text-body-md text-outline mt-2 text-center" style="animation: slideUpFade 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px);">
            Your sanctuary for focus
        </p>
</main>
<!-- Bottom Footer: Loading Indicator -->
<footer class="flex-1 w-full flex items-end justify-center pb-12 z-10">
<div class="flex flex-col items-center gap-3 opacity-0" style="animation: fadeIn 2s ease-in 1s forwards;">
<!-- Minimalist breathing dot -->
<div class="w-2 h-2 rounded-full bg-primary animate-breathe"></div>
<!-- Calming loading text -->
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest opacity-80">
                Preparing your space
            </span>
</div>
</footer>
<style>
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</body></html>
