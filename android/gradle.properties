org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Disable Kotlin incremental compilation.
# The project is on P:\ and the pub cache is on C:\. Kotlin's incremental
# compiler cannot compute relative paths between files on different Windows
# drive roots (toRelativeString throws IllegalArgumentException: "different
# roots"). This causes compileDebugKotlin to crash on the second and
# subsequent builds. The first clean build always succeeds because no
# incremental cache exists yet. Disabling incremental compilation eliminates
# the cross-drive path computation entirely.
# Remove this flag if the project and the pub cache are ever moved to the
# same drive, or if Kotlin fixes the cross-drive Windows limitation.
kotlin.incremental=false
