name: pastel_tasks
description: Offline-first task management app built with Flutter.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  animations: any
  archive: ^4.0.9
  collection: any
  connectivity_plus: any
  device_info_plus: any
  encrypt: ^5.0.3
  equatable: any
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  file_picker: ^8.1.4
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_local_notifications: any
  flutter_plugin_android_lifecycle: 2.0.20
  flutter_quill: 11.5.1
  flutter_riverpod: any
  flutter_secure_storage: any
  flutter_svg: any
  go_router: any
  google_sign_in: ^6.2.1
  googleapis: ^16.0.0
  googleapis_auth: ^2.3.2
  home_widget: ^0.9.3
  http: ^1.6.0
  intl: any
  isar: any
  isar_flutter_libs: any
  logger: any
  lottie: any
  package_info_plus: any
  path: any
  path_provider: any
  reorderable_grid_view: ^2.2.8
  reorderables: ^0.6.0
  riverpod_annotation: any
  share_plus: any
  shared_preferences: any
  timezone: ^0.11.1
  url_launcher: any
  uuid: any
  workmanager: any

dev_dependencies:
  build_runner: any
  flutter_lints: any
  flutter_test:
    sdk: flutter
  freezed: any
  freezed_annotation: any
  golden_toolkit: any
  isar_generator: any
  json_annotation: any
  json_serializable: any
  mocktail: any
  riverpod_generator: any
  very_good_analysis: any

flutter:
  uses-material-design: true
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-VariableFont_wght.ttf
