name: pastel_tasks
description: Offline-first task management app built with Flutter.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  animations: any
  collection: any
  connectivity_plus: any
  device_info_plus: any
  equatable: any
  flutter:
    sdk: flutter
  flutter_local_notifications: any
  flutter_quill: 11.5.1
  flutter_riverpod: any
  flutter_secure_storage: any
  flutter_svg: any
  go_router: any
  google_sign_in: any
  googleapis: any
  googleapis_auth: any
  intl: any
  isar: any
  isar_flutter_libs: any
  logger: any
  lottie: any
  package_info_plus: any
  path: any
  path_provider: any
  reorderable_grid_view: ^2.2.8
  riverpod_annotation: any
  share_plus: any
  shared_preferences: any
  timezone: ^0.11.1
  url_launcher: any
  uuid: any
  workmanager: any

dev_dependencies:
  build_runner: any
  flutter_lints: any
  flutter_test:
    sdk: flutter
  freezed: any
  freezed_annotation: any
  golden_toolkit: any
  isar_generator: any
  json_annotation: any
  json_serializable: any
  mocktail: any
  riverpod_generator: any
  very_good_analysis: any

flutter:
  uses-material-design: true
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-VariableFont_wght.ttf
